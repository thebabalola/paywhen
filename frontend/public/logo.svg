<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark olive background -->
  <rect x="1" y="1" width="42" height="42" rx="12" fill="#131507" stroke="#2E3215" stroke-width="1.5"/>
  <!-- Main diagonal stroke: top-left to bottom-right -->
  <line x1="12" y1="12" x2="28" y2="30" stroke="#8FA828" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Hook stroke: top-right diagonal curving into a left hook at bottom -->
  <path d="M32 12 L22 22 L22 28 C22 32 17.5 33.5 15 31" stroke="#8FA828" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Off-white anchor dot — forge spark -->
  <circle cx="12" cy="30" r="2.8" fill="#C8BFA2"/>
  <!-- Small olive top-right spark -->
  <circle cx="32" cy="12" r="1.8" fill="#8FA828" opacity="0.6"/>
</svg>
